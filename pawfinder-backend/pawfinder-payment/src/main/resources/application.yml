server:
  port: 8085

spring:
  application:
    name: payment-service
  profiles:
    active: dev
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pawfinder_payment?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: pawfinder
    password: pawfinder123
  
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms
  
  # Nacos 配置中心
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: pawfinder
        group: DEFAULT_GROUP
      config:
        server-addr: localhost:8848
        namespace: pawfinder
        group: DEFAULT_GROUP
        file-extension: yaml
    
    # Sentinel 配置
    sentinel:
      transport:
        dashboard: localhost:8858
        port: 8723
      eager: true
    
    # OpenFeign 配置
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
            loggerLevel: FULL
      circuitbreaker:
        enabled: true
    
    # Seata 配置 - AT模式
    seata:
      enabled: true
      application-id: payment-service
      tx-service-group: pawfinder-tx-group
      service:
        vgroup-mapping:
          pawfinder-tx-group: default
      registry:
        type: nacos
        nacos:
          server-addr: localhost:8848
          namespace: pawfinder
          group: SEATA_GROUP

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.pawfinder.payment.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deletedAt
      logic-delete-value: 'NOW()'
      logic-not-delete-value: 'NULL'

# 支付宝沙箱配置
alipay:
  app-id: 9021000142647669
  private-key: ${ALIPAY_PRIVATE_KEY:}
  public-key: ${ALIPAY_PUBLIC_KEY:}
  gateway-url: https://openapi.alipaydev.com/gateway.do
  notify-url: http://your-domain.com/api/payment/notify
  return-url: http://your-domain.com/payment/result
  sign-type: RSA2
  charset: UTF-8
  format: json
  sandbox: true

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Knife4j 配置
knife4j:
  enable: true
  openapi:
    title: PawFinder 支付服务 API
    description: 支付宝沙箱支付接口
    version: 1.0.0
    base-url: http://localhost:8085
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.pawfinder.payment.controller

logging:
  level:
    com.pawfinder: DEBUG
    com.alibaba.nacos: WARN
    io.seata: DEBUG
