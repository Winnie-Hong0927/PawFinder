server:
  port: 8082
spring:
  application:
    name: pet-service
  profiles:
    active: dev
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pawfinder_pet?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: pawfinder
    password: pawfinder123
  
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms
  
  # Elasticsearch 配置
  elasticsearch:
    uris: http://localhost:9200
  
  # Nacos 配置中心
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: pawfinder
        group: DEFAULT_GROUP
      config:
        server-addr: localhost:8848
        namespace: pawfinder
        group: DEFAULT_GROUP
        file-extension: yaml
    
    # Sentinel 配置
    sentinel:
      transport:
        dashboard: localhost:8080
        port: 8720
      eager: true
    
    # Seata 配置
    seata:
      enabled: true
      application-id: pet-service
      tx-service-group: pawfinder-tx-group
      service:
        vgroup-mapping:
          pawfinder-tx-group: default
      registry:
        type: nacos
        nacos:
          server-addr: localhost:8848
          namespace: pawfinder
          group: SEATA_GROUP

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.pawfinder.pet.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deletedAt
      logic-delete-value: 'NOW()'
      logic-not-delete-value: 'NULL'

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Knife4j 配置
knife4j:
  enable: true
  openapi:
    title: PawFinder 宠物服务 API
    description: 宠物CRUD、状态管理接口
    version: 1.0.0
    base-url: http://localhost:8082
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.pawfinder.pet.controller

logging:
  level:
    com.pawfinder: DEBUG
    com.alibaba.nacos: WARN
