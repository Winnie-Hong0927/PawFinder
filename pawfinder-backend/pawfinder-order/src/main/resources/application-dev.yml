server:
  port: 8084

spring:
  application:
    name: order-service
  
  # 开发环境禁用 Nacos
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/pawfinder_order?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deletedAt
      logic-delete-value: "NOW()"
      logic-not-delete-value: "NULL"
  configuration:
    map-underscore-to-camel-case: true

# OpenFeign 配置 - 直连模式
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
  sentinel:
    enabled: false

ribbon:
  nacos:
    enabled: false