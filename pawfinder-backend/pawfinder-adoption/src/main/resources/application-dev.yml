server:
  port: 8083

spring:
  application:
    name: adoption-service
  
  # 开发环境禁用 Nacos
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/pawfinder_adoption?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deletedAt
      logic-delete-value: "NOW()"
      logic-not-delete-value: "NULL"
  configuration:
    map-underscore-to-camel-case: true

# OpenFeign 配置 - 直连模式
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
  # 开发环境禁用 Sentinel
  sentinel:
    enabled: false

# Feign 静态 URL 配置（开发环境直连）
user-service:
  ribbon:
    listOfServers: localhost:8081

pet-service:
  ribbon:
    listOfServers: localhost:8082

# 禁用 Ribbon 与 Nacos 集成
ribbon:
  nacos:
    enabled: false

# 后端服务直连地址
backend:
  user-service:
    url: http://localhost:8081
  pet-service:
    url: http://localhost:8082

# 日志
logging:
  level:
    com.pawfinder: DEBUG
    io.seata: WARN
    com.alibaba.cloud.seata: WARN

seata:
  enabled: true
  # 事务分组名称（可以自定义，但要与下面的 vgroupMapping 的 key 一致）
  tx-service-group: default_tx_group

  # 服务端映射配置
  service:
    # 将事务分组映射到 TC 集群名称（这里的 "default" 只是一个逻辑名，后面 grouplist 会用）
    vgroup-mapping:
      default_tx_group: default
    # 直接指定 TC 服务器的地址和端口（因为没使用注册中心）
    grouplist:
      default: 127.0.0.1:8091   # 请确保 Seata Server 在本机 8091 端口启动

  # 注册中心：不使用 Nacos，采用 file 类型（或不配，默认从 file.conf 读，但建议显式指定）
  registry:
    type: file
  # 配置中心：同样使用 file，避免去 Nacos 读配置
  config:
    type: file