server:
  port: 8083

spring:
  application:
    name: adoption-service
  
  # 开发环境禁用 Nacos
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/pawfinder_adoption?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deletedAt
      logic-delete-value: "NOW()"
      logic-not-delete-value: "NULL"
  configuration:
    map-underscore-to-camel-case: true

# OpenFeign 配置 - 直连模式
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
  # 开发环境禁用 Sentinel
  sentinel:
    enabled: false

# Feign 静态 URL 配置（开发环境直连）
user-service:
  ribbon:
    listOfServers: localhost:8081

pet-service:
  ribbon:
    listOfServers: localhost:8082

# 禁用 Ribbon 与 Nacos 集成
ribbon:
  nacos:
    enabled: false

# 后端服务直连地址
backend:
  user-service:
    url: http://localhost:8081
  pet-service:
    url: http://localhost:8082

# 日志
logging:
  level:
    com.pawfinder: DEBUG
