spring:
  application:
    name: search-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
  config:
    import: optional:nacos:${spring.application.name}.yml
  elasticsearch:
    uris: http://localhost:9200
    username: elastic
    password: 123456

# Elasticsearch 索引配置
elasticsearch:
  index:
    pet: pawfinder_pets

seata:
  enabled: false  # 直接关闭 Seata，你现在不需要