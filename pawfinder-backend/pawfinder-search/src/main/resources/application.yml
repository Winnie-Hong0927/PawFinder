server:
  port: 8086

spring:
  application:
    name: pawfinder-search
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
        file-extension: yml
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8080}
        port: 8719
      eager: true
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}

# Elasticsearch 索引配置
elasticsearch:
  index:
    pet: pawfinder_pet

# Feign 配置
feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000
  sentinel:
    enabled: true
  compression:
    request:
      enabled: true
    response:
      enabled: true

# 日志配置
logging:
  level:
    com.pawfinder: DEBUG
    org.springframework.data.elasticsearch: DEBUG
