server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        # User Service
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**

        # Pet Service
        - id: pet-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/pet/**

        # Adoption Service
        - id: adoption-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/adoption/**

        # Swagger UI
        - id: swagger-user
          uri: http://localhost:8081
          predicates:
            - Path=/user/swagger-ui.html
            - Path=/user/api-docs
          filters:
            - RewritePath=/user/(?<segment>.*), /$\{segment}

        - id: swagger-pet
          uri: http://localhost:8082
          predicates:
            - Path=/pet/swagger-ui.html
            - Path=/pet/api-docs
          filters:
            - RewritePath=/pet/(?<segment>.*), /$\{segment}

        - id: swagger-adoption
          uri: http://localhost:8083
          predicates:
            - Path=/adoption/swagger-ui.html
            - Path=/adoption/api-docs
          filters:
            - RewritePath=/adoption/(?<segment>.*), /$\{segment}

      # Global CORS configuration
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

# Sentinel configuration
sentinel:
  dashboard:
    enabled: false
  eager:
    enabled: false

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
