server:
  port: 8080

spring:
  application:
    name: gateway-service
  
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      
      routes:
        # User Service
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
        
        # Pet Service
        - id: pet-service
          uri: lb://pet-service
          predicates:
            - Path=/api/pet/**
        
        # Adoption Service
        - id: adoption-service
          uri: lb://adoption-service
          predicates:
            - Path=/api/adoption/**
        
        # Order Service
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**
        
        # Payment Service
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payment/**
        
        # Search Service
        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/api/search/**

# 日志配置
logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.pawfinder.gateway: DEBUG
