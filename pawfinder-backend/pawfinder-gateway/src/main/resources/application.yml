server:
  port: 8080

spring:
  application:
    name: gateway-service
  
  # Nacos 配置中心
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: pawfinder
        group: DEFAULT_GROUP
      config:
        server-addr: localhost:8848
        namespace: pawfinder
        group: DEFAULT_GROUP
        file-extension: yaml
    
    # Gateway 路由配置
    gateway:
      # 从 Nacos 发现服务进行负载均衡
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      
      routes:
        # User Service
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@ipKeyResolver}"

        # Pet Service
        - id: pet-service
          uri: lb://pet-service
          predicates:
            - Path=/api/pet/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 200
                redis-rate-limiter.burstCapacity: 400
                key-resolver: "#{@ipKeyResolver}"

        # Adoption Service
        - id: adoption-service
          uri: lb://adoption-service
          predicates:
            - Path=/api/adoption/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@ipKeyResolver}"

        # Order Service
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@ipKeyResolver}"

        # Payment Service
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payment/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@ipKeyResolver}"

        # Search Service
        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/api/search/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 200
                redis-rate-limiter.burstCapacity: 400
                key-resolver: "#{@ipKeyResolver}"

      # Global CORS configuration
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms

# Sentinel 流量控制配置
spring.cloud.sentinel:
  transport:
    dashboard: localhost:8858
    port: 8720
  eager: true
  datasource:
    # 从 Nacos 读取限流规则
    flow:
      nacos:
        server-addr: localhost:8848
        namespace: pawfinder
        group: SENTINEL_GROUP
        data-id: gateway-flow-rules
        rule-type: flow
    # 从 Nacos 读取降级规则
    degrade:
      nacos:
        server-addr: localhost:8848
        namespace: pawfinder
        group: SENTINEL_GROUP
        data-id: gateway-degrade-rules
        rule-type: degrade

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    com.pawfinder: DEBUG
    com.alibaba.nacos: WARN
    com.alibaba.csp.sentinel: DEBUG
