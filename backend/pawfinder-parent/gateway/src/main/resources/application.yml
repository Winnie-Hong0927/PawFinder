server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: PAWFINDER_GROUP
      config:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: PAWFINDER_GROUP
        file-extension: yaml
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # User Service
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
        # Pet Service
        - id: pet-service
          uri: lb://pet-service
          predicates:
            - Path=/api/pets/**
          filters:
            - StripPrefix=1
        # Adoption Service
        - id: adoption-service
          uri: lb://adoption-service
          predicates:
            - Path=/api/adoptions/**
          filters:
            - StripPrefix=1
        # Donation Service
        - id: donation-service
          uri: lb://donation-service
          predicates:
            - Path=/api/donations/**
          filters:
            - StripPrefix=1
        # Chat Service
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**
          filters:
            - StripPrefix=1
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

# JWT Secret
jwt:
  secret: pawfinder-gateway-secret-key-2024-very-long-and-secure
  expiration: 86400000

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
