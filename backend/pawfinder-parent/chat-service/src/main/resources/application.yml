server:
  port: 8085

spring:
  application:
    name: chat-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: PAWFINDER_GROUP
      config:
        server-addr: ${NACOS_HOST:localhost}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: PAWFINDER_GROUP
        file-extension: yaml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pawfinder}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    type: com.alibaba.druid.pool.DruidDataSource

doubao:
  api-key: ${DOUBAN_API_KEY:}
  model: ${DOUBAN_MODEL:doubao-pro}
  base-url: ${DOUBAN_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}

logging:
  level:
    com.pawfinder: DEBUG
